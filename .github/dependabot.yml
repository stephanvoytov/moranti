version: 2
updates:
  - package-ecosystem: "npm"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "monday"
      time: "10:00"
      timezone: "Europe/Moscow"
    open-pull-requests-limit: 5
    labels:
      - "dependencies"
    commit-message:
      prefix: "chore"
      include: "scope"
    ignore:
      # Next.js мажорные — только руками
      - dependency-name: "next"
        versions: [">=17"]
      # Prisma мажорные — только руками
      - dependency-name: "@prisma/client"
        versions: [">=8"]
      - dependency-name: "prisma"
        versions: [">=8"]
